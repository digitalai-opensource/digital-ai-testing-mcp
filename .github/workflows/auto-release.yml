name: Auto Release

on:
  push:
    branches: [main]

jobs:
  auto-release:
    name: Create release if version is new
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.check.outputs.exists == 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Read version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest

  # Releases created above use GITHUB_TOKEN, which suppresses the
  # `release: published` event (GitHub recursion prevention) — so the Docker
  # build in release.yml would never fire. Call it directly instead.
  docker:
    name: Publish Docker image
    needs: auto-release
    if: needs.auto-release.outputs.created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.auto-release.outputs.version }}
    permissions:
      contents: read
      packages: write
