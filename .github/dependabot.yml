version: 2

updates:

  # npm — watches package.json for dependency updates
  - package-ecosystem: "npm"
    directory: "/"             # where package.json lives (repo root)
    schedule:
      interval: "weekly"       # opens PRs every Monday
    open-pull-requests-limit: 5 # max open PRs at once to avoid noise
    labels:
      - "dependencies"
      - "npm"

  # Docker — watches FROM lines in the Dockerfile
  - package-ecosystem: "docker"
    directory: "/"             # where the Dockerfile lives
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions — watches uses: lines in all workflow files
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
